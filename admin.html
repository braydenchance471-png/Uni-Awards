<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infinite Awards Admin</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse at right, rgba(255,150,60,0.18), black 70%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .panel {
      width: 100%;
      max-width: 420px;
      padding: 48px;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      border: 1px solid rgba(255,180,90,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    h1 { text-align: center; margin-bottom: 30px; }

    label { font-size: 18px; }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      margin-bottom: 22px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffb347, #ff8c1a);
      color: black;
    }

.status {
  margin-top: 18px;
  color: #ff6b6b;
  opacity: 0;
  transition: opacity 0.3s;
}

.admin-page .panel {
  max-width: 980px;
  width: calc(100% - 80px);
}

.submissions-scroll {
  max-height: calc(100vh - 300px);
  overflow-y: auto;
  padding-right: 6px;
}

.submissions-inner {
  max-width: 100%;
  padding: 20px;
  background: rgba(0,0,0,0.45);
  border-radius: 12px;
  border: 1px solid rgba(255,180,90,0.15);
  height: 700px;
  overflow: hidden;
  display: block;
}

.submissions-container {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-content: flex-start;
  justify-content: center;
  padding: 8px;
  height: 100%;
  box-sizing: border-box;
  overflow-y: auto;
}

.submission-card {
  width: 180px;
  min-height: 120px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-sizing: border-box;
}

.submission-card.open {
  height: auto;
}

.expand-btn {
  padding: 6px 10px;
  font-size: 13px;
  border-radius: 8px;
  width: auto;
}

.submission-card[data-removing="true"] {
  opacity: 0.6;
  transition: opacity 0.3s ease;
}
.submission-card .indicator {
  display: block;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(255,180,90,0.9);
  color: black;
  font-weight: bold;
  float: right;
}

.status.show {
  opacity: 1;
}

  .admin-header {
  position: fixed;
  top: 0;
  left: 0;
  height: 70px;
  width: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  z-index: 1000;
}

.admin-presence {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #ddd;
}
.admin-presence .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #777;
  display: inline-block;
}

.admin-main {
  padding-top: 90px;
  height: calc(100vh - 90px);
  overflow: hidden;
}

  .header-tabs {
  display: flex;
  gap: 14px;
  align-items: center;
}
.header-tabs button {
  width: auto;
  padding: 10px 22px;
}


#pages {
  position: relative;
  height: calc(100vh - 80px);
}

.admin-page {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;

  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
  transition: 0.35s ease;
}

.admin-page.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

    .submission-card {
      background: rgba(0,0,0,0.55);
      border-radius: 18px;
      border: 1px solid rgba(255,180,90,0.3);
      padding: 20px;
      margin-bottom: 18px;
    }

    .submission-body {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: 0.4s;
}

.submission-body.open {
  max-height: 400px;
  opacity: 1;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 220ms ease;
}
.modal-backdrop:not(.hidden) {
  opacity: 1;
  pointer-events: auto;
}
.modal {
  background: rgba(0,0,0,0.9);
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 480px;
  border: 1px solid rgba(255,180,90,0.25);
  transform: translateY(-8px) scale(0.98);
  opacity: 0;
  transition: transform 220ms ease, opacity 220ms ease;
}
.modal-backdrop:not(.hidden) .modal {
  transform: translateY(0) scale(1);
  opacity: 1;
}
.hidden { opacity: 0; pointer-events: none; }

.actions {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}

.welcome-banner {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 16px 34px;
  background: linear-gradient(135deg, #ffb347, #ff8c1a);
  color: black;
  font-weight: bold;
  font-size: 20px;
  border-radius: 14px;
  box-shadow: 0 14px 40px rgba(255,170,70,0.5);
  transition: top 0.6s ease;
  z-index: 2000;
}

.login-wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.welcome-banner.show {
  top: 20px;
}

.admin-root {
  display: none;
}

  </style>
</head>
<body>
<div id="welcome" class="welcome-banner"></div>

<div id="resetBackdrop" class="modal-backdrop hidden" onclick="hideResetModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Reset Admin Credentials</h3>
    <div style="margin-top:8px">
      <label>Current Username</label>
      <input id="curUser" />
      <label>Current Password</label>
      <input id="curPass" type="password" />
      <label>New Username</label>
      <input id="newUser" />
      <label>New Password</label>
      <input id="newPass" type="password" />
      <label>New Display Name (optional)</label>
      <input id="newName" />
      <div id="resetError" style="color:#ff8c8c; margin-top:8px; display:none"></div>
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button onclick="hideResetModal()" style="flex:1; background:#ccc; color:black">Cancel</button>
        <button onclick="submitReset()" style="flex:1;">Change</button>
      </div>
    </div>
  </div>
</div>
<div id="saveToast" style="position:fixed;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffb347,#ff8c1a);color:black;padding:12px 20px;border-radius:12px;display:none;z-index:4000;font-weight:bold;"></div>

<script>
async function save() {
  const round = document.getElementById('round').value;
  const time = document.getElementById('time').value;

  try {
    
    const curRes = await fetch('/data');
    const cur = curRes.ok ? await curRes.json() : {};

    const payload = Object.assign({}, cur, { round });
    if (time) payload.countdownEnd = new Date(time).toISOString();

    const res = await fetch('/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error('save failed');

    
    try { localStorage.setItem('countdown-updated', Date.now()); } catch (e){}

    showSaveToast('Successfully saved changes');
  } catch (e) {
    showSaveToast('Unable to save changes. please try again.');
  }
}

function showSaveToast(msg) {
  const el = document.getElementById('saveToast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 2200);
}
</script>

<div id="submissionModal" class="modal-backdrop hidden" onclick="hideSubmissionModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Submission Details</h3>
    <div style="margin-top:8px"><strong>Creator:</strong> <span class="sub-creator"></span></div>
    <div style="margin-top:8px"><strong>Team Size:</strong> <span class="sub-team"></span></div>
    <div style="margin-top:8px"><strong>Game Link:</strong> <a class="sub-link" href="#" target="_blank"></a></div>
    <div style="margin-top:8px"><strong>Status:</strong> <span class="sub-status"></span></div>
    <div style="margin-top:8px"><strong>Reason:</strong> <div class="sub-reason" style="margin-top:6px"></div></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button onclick="hideSubmissionModal()" style="flex:1; background:#ccc; color:black">Close</button>
      <button onclick="modalAccept()" style="flex:1;">Accept</button>
      <button onclick="modalDeny()" style="flex:1;">Deny</button>
    </div>
  </div>


</body>
</html>
