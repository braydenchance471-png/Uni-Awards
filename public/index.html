<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnifyAwards 2026</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="home">
  <div class="background"><span></span><span></span><span></span><i></i><i></i><i></i></div>
  <header class="site-header">
    <a class="brand" href="/"><img src="/assets/logo.png" alt="Unify Awards logo" /><strong>UnifyAwards 2026</strong></a>
    <button class="menu-toggle" aria-label="Open menu">☰</button>
    <nav class="nav-links"><a href="/">Home</a><a href="/leaderboard">Leaderboard</a><a href="/guidelines">Guidelines</a><a href="/information">Information</a></nav>
  </header>
  <main class="page home-page reveal">
    <section class="home-hero">
  <div class="hero-card countdown-card reveal">
    <span class="eyebrow">Game Jam Countdown</span>

    <h1>UnifyAwards 2026</h1>

    <div class="countdown" data-countdown>
      <div class="countdown-unit">
        <span data-months>00</span>
        <small>Months</small>
      </div>

      <div class="countdown-separator">:</div>

      <div class="countdown-unit">
        <span data-days>00</span>
        <small>Days</small>
      </div>

      <div class="countdown-separator">:</div>

      <div class="countdown-unit">
        <span data-hours>00</span>
        <small>Hours</small>
      </div>

      <div class="countdown-separator">:</div>

      <div class="countdown-unit">
        <span data-minutes>00</span>
        <small>Minutes</small>
      </div>

      <div class="countdown-separator">:</div>

      <div class="countdown-unit">
        <span data-seconds>00</span>
        <small>Seconds</small>
      </div>
    </div>

    <p class="hero-subtext">
      Build. Submit. Compete. Rise through the official Unify Awards leaderboard.
    </p>

    <a href="/leaderboard.html" class="primary-btn" data-transition>
      View Leaderboard
    </a>
  </div>
</section>
  </main>
  <script src="/js/main.js"></script>
</body>
</html>
